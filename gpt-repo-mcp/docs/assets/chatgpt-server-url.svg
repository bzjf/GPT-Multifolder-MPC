<svg xmlns="http://www.w3.org/2000/svg" width="720" height="540" viewBox="0 0 720 540" role="img" aria-labelledby="title desc">
  <title id="title">ChatGPT connector setup with Server URL selected</title>
  <desc id="desc">A simplified dark UI mock showing the ChatGPT New App form with Server URL selected and an MCP URL field.</desc>
  <rect width="720" height="540" rx="22" fill="#1f1f1f"/>
  <text x="32" y="48" fill="#ffffff" font-family="Arial, sans-serif" font-size="26" font-weight="700">New App</text>
  <text x="676" y="48" fill="#ffffff" font-family="Arial, sans-serif" font-size="28">x</text>
  <rect x="32" y="80" width="72" height="72" rx="16" fill="#242424" stroke="#555" stroke-dasharray="6 6"/>
  <text x="55" y="127" fill="#bdbdbd" font-family="Arial, sans-serif" font-size="34">+</text>
  <text x="124" y="100" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="700">Icon</text>
  <text x="162" y="100" fill="#bdbdbd" font-family="Arial, sans-serif" font-size="16">(optional)</text>
  <text x="124" y="126" fill="#bdbdbd" font-family="Arial, sans-serif" font-size="15">PNG only. Best results at 256 x 256 px or larger.</text>
  <text x="32" y="184" fill="#ffffff" font-family="Arial, sans-serif" font-size="17" font-weight="700">Name</text>
  <rect x="32" y="198" width="656" height="46" rx="8" fill="#242424" stroke="#555"/>
  <text x="52" y="227" fill="#ffffff" font-family="Arial, sans-serif" font-size="17">GPT Repo MCP</text>
  <text x="32" y="282" fill="#ffffff" font-family="Arial, sans-serif" font-size="17" font-weight="700">Connection</text>
  <rect x="384" y="260" width="304" height="46" rx="23" fill="#6a6a6a"/>
  <rect x="394" y="268" width="132" height="30" rx="15" fill="#222222"/>
  <text x="424" y="288" fill="#ffffff" font-family="Arial, sans-serif" font-size="15" font-weight="700">Server URL</text>
  <text x="568" y="288" fill="#d7d7d7" font-family="Arial, sans-serif" font-size="15" font-weight="700">Tunnel</text>
  <rect x="32" y="320" width="656" height="54" rx="8" fill="#242424" stroke="#ffffff" stroke-width="2"/>
  <text x="52" y="353" fill="#dcdcdc" font-family="Arial, sans-serif" font-size="17">https://&lt;ngrok-host&gt;/t/&lt;random-token&gt;/mcp</text>
  <text x="32" y="410" fill="#ffffff" font-family="Arial, sans-serif" font-size="17" font-weight="700">Authentication</text>
  <rect x="32" y="424" width="656" height="46" rx="8" fill="#242424" stroke="#555"/>
  <text x="52" y="453" fill="#ffffff" font-family="Arial, sans-serif" font-size="17">No Auth</text>
</svg>
